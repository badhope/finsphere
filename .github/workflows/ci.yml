name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript Compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

  validate-yaml:
    name: Validate YAML Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate YAML files
        run: |
          python -c "
          import yaml
          import glob
          import sys
          
          yaml_files = glob.glob('**/*.yaml', recursive=True) + glob.glob('**/*.yml', recursive=True)
          errors = []
          
          for f in yaml_files:
              try:
                  with open(f, 'r', encoding='utf-8') as file:
                      yaml.safe_load(file)
                  print(f'✓ {f}')
              except Exception as e:
                  errors.append(f'{f}: {e}')
                  print(f'✗ {f}: {e}')
          
          if errors:
              sys.exit(1)
          print(f'\n✅ Validated {len(yaml_files)} YAML files successfully!')
          "

  project-structure:
    name: Project Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          echo "Checking project structure..."
          
          REQUIRED_FILES=(
            "README.md"
            "package.json"
            "tsconfig.json"
            "mcp/index.ts"
            "packages/core/mcp/builder.ts"
            "packages/core/shared/utils.ts"
          )
          
          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ $file"
            else
              echo "✗ $file - MISSING"
              exit 1
            fi
          done
          
          echo ""
          echo "✅ All required files present!"

  mcp-validation:
    name: MCP Modules Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate MCP directory structure
        run: |
          echo "Validating MCP structure..."
          
          MCP_DIRS=$(find mcp -mindepth 1 -maxdepth 1 -type d | sort)
          DIR_COUNT=$(echo "$MCP_DIRS" | wc -l)
          echo "Found $DIR_COUNT MCP directories"
          
          INDEX_COUNT=$(grep -c "() => import" mcp/index.ts || echo "0")
          echo "Registered modules in mcp/index.ts: $INDEX_COUNT"
          
          for dir in $MCP_DIRS; do
            if [ -f "$dir/index.ts" ]; then
              echo "✓ $dir/index.ts"
            else
              echo "✗ $dir/index.ts - MISSING"
              exit 1
            fi
          done
          
          echo ""
          echo "✅ All $DIR_COUNT MCP modules have index.ts files!"

  skill-validation:
    name: Skill Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate skill files
        run: |
          echo "Validating skill files..."
          
          SKILL_FILES=$(find .trae/skills -name "SKILL.md" | sort)
          SKILL_COUNT=$(echo "$SKILL_FILES" | wc -l)
          echo "Found $SKILL_COUNT skill files"
          
          if [ "$SKILL_COUNT" -lt 50 ]; then
            echo "⚠️  Warning: Less than 50 skills found ($SKILL_COUNT)"
          fi
          
          for skill in $SKILL_FILES; do
            if ! grep -q "#" "$skill"; then
              echo "⚠️  $skill might be malformed (no headers)"
            fi
          done
          
          echo ""
          echo "✅ Skill validation passed with $SKILL_COUNT skills!"

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [typescript, validate-yaml, project-structure, mcp-validation, skill-validation]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate summary
        run: |
          echo "# 🚀 CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          MCP_COUNT=$(find mcp -mindepth 1 -maxdepth 1 -type d | wc -l)
          SKILL_COUNT=$(find .trae/skills -name "SKILL.md" | wc -l)
          
          echo "## 📊 Project Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Modules | $MCP_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Skill Definitions | $SKILL_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## ✅ All checks passed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript compilation: 0 errors" >> $GITHUB_STEP_SUMMARY
          echo "- YAML validation: passed" >> $GITHUB_STEP_SUMMARY
          echo "- Project structure: valid" >> $GITHUB_STEP_SUMMARY
          echo "- MCP validation: all modules registered" >> $GITHUB_STEP_SUMMARY
          echo "- Skill files: all present" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 Ready for release!" >> $GITHUB_STEP_SUMMARY
