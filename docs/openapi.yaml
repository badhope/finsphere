openapi: 3.0.3
info:
  title: AI Programming Assistant System
  description: |
    A comprehensive AI programming assistant with enhanced memory capabilities,
    reinforcement learning, code analysis, and MCP tools integration.

    ## Core Features
    - **Context Memory**: Hierarchical memory architecture with short-term, medium-term, and long-term storage
    - **RL Engine**: PPO-based reinforcement learning for code generation optimization
    - **Coding Engine**: Multi-language code analysis, generation, and optimization
    - **MCP Tools**: Extensible tool framework for code quality, testing, and documentation
    - **Network Module**: Distributed microservice architecture with load balancing and circuit breakers

    ## Architecture
    The system follows a modular architecture with clear separation of concerns:
    - Context Memory Service handles all memory operations
    - RL Engine manages policy learning and action selection
    - Coding Engine provides code analysis and generation
    - MCP Framework offers extensible tool integration
  version: 1.0.0
  contact:
    name: AI Programming Assistant Team
  license:
    name: CC BY 4.0

servers:
  - url: http://localhost:8000/api/v1
    description: Local development server
  - url: https://api.example.com/api/v1
    description: Production server

tags:
  - name: Memory
    description: Context memory operations
  - name: RL
    description: Reinforcement learning operations
  - name: Coding
    description: Code analysis and generation
  - name: MCP
    description: MCP tool operations
  - name: Health
    description: System health and monitoring

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Returns the health status of the system
      operationId: getHealth
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: System is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /memory/store:
    post:
      tags:
        - Memory
      summary: Store a memory entry
      description: |
        Stores a new memory entry in the appropriate memory layer based on
        importance score and memory type.
      operationId: storeMemory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryStoreRequest'
      responses:
        '200':
          description: Memory stored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryEntry'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /memory/get/{entryId}:
    get:
      tags:
        - Memory
      summary: Retrieve a memory entry
      description: Retrieves a specific memory entry by ID
      operationId: getMemory
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: memoryType
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/MemoryType'
      responses:
        '200':
          description: Memory entry found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryEntry'
        '404':
          description: Memory entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /memory/search:
    post:
      tags:
        - Memory
      summary: Search memories
      description: |
        Search memories using semantic similarity or keyword matching.
        Returns results sorted by relevance within 100ms.
      operationId: searchMemory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemorySearchRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemorySearchResponse'
        '400':
          description: Invalid search parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /memory/context:
    post:
      tags:
        - Memory
      summary: Assemble context
      description: |
        Assembles context from all memory layers for a given session.
        Combines short-term, medium-term, and relevant long-term memories.
      operationId: assembleContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContextRequest'
      responses:
        '200':
          description: Context assembled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextResponse'

  /memory/consolidate:
    post:
      tags:
        - Memory
      summary: Consolidate memories
      description: |
        Runs memory consolidation process to promote high-importance
        memories to long-term storage and demote low-importance ones.
      operationId: consolidateMemory
      responses:
        '200':
          description: Consolidation complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsolidationResult'

  /rl/action:
    post:
      tags:
        - RL
      summary: Select RL action
      description: |
        Uses the RL policy network to select an optimal action
        based on the current state.
      operationId: selectAction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionRequest'
      responses:
        '200':
          description: Action selected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
        '400':
          description: Invalid state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /rl/execute:
    post:
      tags:
        - RL
      summary: Execute code action
      description: |
        Executes a code action and calculates the reward based on
        execution results and code quality metrics.
      operationId: executeAction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteRequest'
      responses:
        '200':
          description: Execution complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionResponse'

  /rl/train:
    post:
      tags:
        - RL
      summary: Train RL model
      description: Performs a training step using PPO algorithm
      operationId: trainModel
      responses:
        '200':
          description: Training complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingResult'

  /rl/statistics:
    get:
      tags:
        - RL
      summary: Get RL statistics
      description: Returns training and performance statistics
      operationId: getRLStatistics
      responses:
        '200':
          description: Statistics retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RLStatistics'

  /code/analyze:
    post:
      tags:
        - Coding
      summary: Analyze code
      description: |
        Performs static analysis on code including syntax checking,
        metrics calculation, and issue detection.
      operationId: analyzeCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodeAnalysisRequest'
      responses:
        '200':
          description: Analysis complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeAnalysisResponse'

  /code/quality:
    post:
      tags:
        - Coding
      summary: Check code quality
      description: |
        Performs comprehensive code quality analysis including
        security, style, and performance checks.
      operationId: checkCodeQuality
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodeQualityRequest'
      responses:
        '200':
          description: Quality check complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeQualityResponse'

  /code/optimize:
    post:
      tags:
        - Coding
      summary: Optimize code
      description: |
        Analyzes code for optimization opportunities and
        provides optimized versions.
      operationId: optimizeCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodeOptimizeRequest'
      responses:
        '200':
          description: Optimization complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeOptimizeResponse'

  /code/pattern/{patternName}:
    get:
      tags:
        - Coding
      summary: Get design pattern
      description: Retrieves design pattern information and template
      operationId: getPattern
      parameters:
        - name: patternName
          in: path
          required: true
          schema:
            type: string
            enum: [singleton, factory, factory_method, abstract_factory, builder, observer, strategy, decorator, facade]
      responses:
        '200':
          description: Pattern retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatternInfo'
        '404':
          description: Pattern not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /mcp/tools:
    get:
      tags:
        - MCP
      summary: List MCP tools
      description: Lists all registered MCP tools
      operationId: listTools
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: tags
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Tools listed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolsListResponse'

  /mcp/tools/{toolName}:
    get:
      tags:
        - MCP
      summary: Get tool definition
      description: Gets detailed information about a specific tool
      operationId: getTool
      parameters:
        - name: toolName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tool found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolDefinition'
        '404':
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /mcp/execute:
    post:
      tags:
        - MCP
      summary: Execute MCP tool
      description: Executes a registered MCP tool with given parameters
      operationId: executeTool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolExecuteRequest'
      responses:
        '200':
          description: Execution complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResult'
        '400':
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /mcp/chain:
    post:
      tags:
        - MCP
      summary: Execute tool chain
      description: |
        Executes multiple MCP tools in sequence, passing context
        between each tool.
      operationId: executeToolChain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolChainRequest'
      responses:
        '200':
          description: Chain execution complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolChainResponse'

  /mcp/statistics:
    get:
      tags:
        - MCP
      summary: Get MCP statistics
      description: Returns execution statistics for all MCP tools
      operationId: getMCPStatistics
      responses:
        '200':
          description: Statistics retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPStatistics'

  /ws/events:
    get:
      tags:
        - WebSocket
      summary: WebSocket connection
      description: |
        Establishes a WebSocket connection for real-time events
        including code generation progress, memory updates, and
        training progress notifications.
      operationId: websocketConnect
      responses:
        '101':
          description: Switching protocols successful
        '400':
          description: Invalid request

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        components:
          type: object
          properties:
            memory:
              type: string
            rl_engine:
              type: string
            coding_engine:
              type: string
            mcp_framework:
              type: string

    Error:
      type: object
      required:
        - error
        - code
      properties:
        error:
          type: string
        code:
          type: integer
        details:
          type: object

    MemoryType:
      type: string
      enum: [short_term, medium_term, long_term]

    MemoryStoreRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: Memory content
        importance_score:
          type: number
          minimum: 0.0
          maximum: 1.0
          default: 0.5
        memory_type:
          $ref: '#/components/schemas/MemoryType'
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object

    MemoryEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        memory_type:
          $ref: '#/components/schemas/MemoryType'
        importance_score:
          type: number
        timestamp:
          type: string
          format: date-time
        version:
          type: integer
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object

    MemorySearchRequest:
      type: object
      properties:
        query_text:
          type: string
        query_embedding:
          type: array
          items:
            type: number
        top_k:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
        threshold:
          type: number
          minimum: 0.0
          maximum: 1.0
          default: 0.7
        memory_types:
          type: array
          items:
            $ref: '#/components/schemas/MemoryType'
        tags:
          type: array
          items:
            type: string

    MemorySearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              entry:
                $ref: '#/components/schemas/MemoryEntry'
              similarity_score:
                type: number
              rank:
                type: integer
        total:
          type: integer
        search_time_ms:
          type: number

    ContextRequest:
      type: object
      required:
        - session_id
      properties:
        current_query:
          type: string
        session_id:
          type: string
        embedding:
          type: array
          items:
            type: number

    ContextResponse:
      type: object
      properties:
        short_term:
          type: array
          items:
            type: string
        medium_term:
          type: array
          items:
            type: string
        long_term:
          type: array
          items:
            type: string
        metadata:
          type: object
          properties:
            short_term_count:
              type: integer
            medium_term_count:
              type: integer
            long_term_count:
              type: integer

    ConsolidationResult:
      type: object
      properties:
        promoted:
          type: integer
        demoted:
          type: integer
        evicted:
          type: integer

    ActionRequest:
      type: object
      required:
        - context
      properties:
        context:
          type: object
          properties:
            current_query:
              type: string
            memory_context:
              type: object
            action_type:
              type: string
            language:
              type: string
        training:
          type: boolean
          default: true

    ActionResponse:
      type: object
      properties:
        action:
          type: integer
        action_type:
          type: string
        log_probability:
          type: number

    ExecuteRequest:
      type: object
      required:
        - code_action
        - context
      properties:
        code_action:
          type: object
          properties:
            action_type:
              type: string
              enum: [generate, refactor, debug, optimize, complete, review]
            code:
              type: string
            language:
              type: string
            step_number:
              type: integer
        context:
          type: object

    ExecutionResponse:
      type: object
      properties:
        success:
          type: boolean
        output:
          type: string
        error:
          type: string
        execution_time:
          type: number
        reward:
          type: number

    TrainingResult:
      type: object
      properties:
        policy_loss:
          type: number
        value_loss:
          type: number
        entropy:
          type: number
        iteration:
          type: integer
        epsilon:
          type: number

    RLStatistics:
      type: object
      properties:
        total_experiences:
          type: integer
        average_reward_100:
          type: number
        success_rate_100:
          type: number
        epsilon:
          type: number
        memory_size:
          type: integer
        is_training:
          type: boolean

    CodeAnalysisRequest:
      type: object
      required:
        - code
        - language
      properties:
        code:
          type: string
        language:
          type: string
          enum: [python, javascript, typescript, java, cpp, c, csharp, go, rust, ruby]

    CodeAnalysisResponse:
      type: object
      properties:
        language:
          type: string
        is_valid_syntax:
          type: boolean
        errors:
          type: array
          items:
            type: object
            properties:
              line:
                type: integer
              column:
                type: integer
              message:
                type: string
              severity:
                type: string
        warnings:
          type: array
          items:
            type: object
        metrics:
          type: object
          properties:
            total_lines:
              type: integer
            code_lines:
              type: integer
            comment_lines:
              type: integer
            function_count:
              type: integer
            class_count:
              type: integer

    CodeQualityRequest:
      type: object
      required:
        - code
        - language
      properties:
        code:
          type: string
        language:
          type: string
        check_security:
          type: boolean
          default: true
        check_style:
          type: boolean
          default: true
        check_performance:
          type: boolean
          default: true

    CodeQualityResponse:
      type: object
      properties:
        quality_score:
          type: number
        grade:
          type: string
        issues:
          type: array
          items:
            type: object
            properties:
              line:
                type: integer
              severity:
                type: string
              category:
                type: string
              message:
                type: string
              suggestion:
                type: string
        summary:
          type: object
          properties:
            total_issues:
              type: integer
            errors:
              type: integer
            warnings:
              type: integer
            info:
              type: integer

    CodeOptimizeRequest:
      type: object
      required:
        - code
        - language
      properties:
        code:
          type: string
        language:
          type: string

    CodeOptimizeResponse:
      type: object
      properties:
        original_code:
          type: string
        optimized_code:
          type: string
        improvements:
          type: array
          items:
            type: string
        estimated_speedup:
          type: number

    PatternInfo:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        description:
          type: string
        use_cases:
          type: array
          items:
            type: string
        template:
          type: string

    ToolDefinition:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        input_schema:
          type: object
        output_schema:
          type: object
        tags:
          type: array
          items:
            type: string
        category:
          type: string
        version:
          type: string

    ToolExecuteRequest:
      type: object
      required:
        - tool_name
        - parameters
      properties:
        tool_name:
          type: string
        parameters:
          type: object
        timeout:
          type: number
          description: Execution timeout in seconds

    ToolResult:
      type: object
      properties:
        tool_name:
          type: string
        success:
          type: boolean
        data:
          type: object
        error:
          type: string
        execution_time_ms:
          type: number
        timestamp:
          type: string
          format: date-time

    ToolChainRequest:
      type: object
      required:
        - chain
      properties:
        chain:
          type: array
          items:
            type: object
            properties:
              tool_name:
                type: string
              parameters:
                type: object
        timeout:
          type: number

    ToolChainResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/ToolResult'
        total_execution_time_ms:
          type: number

    ToolsListResponse:
      type: object
      properties:
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolDefinition'
        total:
          type: integer

    MCPStatistics:
      type: object
      properties:
        total_tools:
          type: integer
        total_executions:
          type: integer
        success_rate:
          type: number
        failure_rate:
          type: number
        tool_statistics:
          type: object

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []

externalDocs:
  description: Full documentation
  url: https://docs.example.com/api
