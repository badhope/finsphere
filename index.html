<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FinSphere Pro - Enterprise Financial Data Management Platform" />
    <meta name="keywords" content="financial, dashboard, analytics, trading, enterprise" />
    <meta name="author" content="FinSphere Team" />
    
    <!-- PWA配置 -->
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- 主题色 -->
    <meta name="theme-color" content="#409eff" />
    
    <title><%= VITE_APP_TITLE %></title>
  </head>
  <body>
    <div id="app">
      <!-- 加载动画 -->
      <div class="loading-container">
        <div class="spinner"></div>
        <p class="loading-text">Loading FinSphere Pro...</p>
      </div>
    </div>
    
    <!-- 错误边界 -->
    <script>
      window.addEventListener('error', function(e) {
        console.error('Application Error:', e.error);
        // 可以在这里发送错误到监控服务
      });
      
      window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled Promise Rejection:', e.reason);
      });
    </script>
  </body>
</html>
